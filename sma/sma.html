<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Syst&#232;me Multiagents</title>
  <link rel="stylesheet" href="sma_style.css" />
  <script src="webgpustudio2.js" defer></script>
  <script src="sma_app.js" defer></script>
</head>
<body>
  <main>
    <h1>Syst&#232;me Multiagents</h1>
    <section class="panel">
      <div class="panel-header">
        <div>
          <p class="eyebrow">Projet SimBugs</p>
          <h2>Vue 2D du buffer Render</h2>
        </div>
        <div class="panel-actions">
          <span class="buffer-meta" id="bufferMeta">Chargement...</span>
          <span class="step-label" id="stepLabel">step = 0</span>
          <button type="button" class="run-button" id="runButton" disabled>run</button>
        </div>
      </div>

      <div class="preview-area">
        <aside class="agent-types" aria-label="Types d'agents">
          <h3>Types d'agents</h3>
          <div class="agent-type-actions" aria-label="Gestion des types d'agents">
            <button type="button" class="agent-type-action" id="addAgentTypeButton" aria-label="Ajouter un type d'agent">+</button>
            <button type="button" class="agent-type-action" id="removeAgentTypeButton" aria-label="Supprimer le type d'agent s&eacute;lectionn&eacute;">-</button>
          </div>
          <ul class="agent-type-list" id="agentTypesList" aria-label="Liste des types d'agents">
            <li class="is-empty">Chargement...</li>
          </ul>
        </aside>
        <canvas id="bufferCanvas" class="texture-canvas" width="512" height="256"></canvas>
        <aside class="agent-properties" aria-label="Propri&eacute;t&eacute;s du type d'agent s&eacute;lectionn&eacute;">
          <h3>Propri&eacute;t&eacute;s</h3>
          <div class="property-list">
            <label class="property-field" for="agentName">
              <span>Nom</span>
              <input id="agentName" type="text" disabled />
            </label>
            <label class="property-field" for="agentColor">
              <span>Couleur</span>
              <input id="agentColor" class="color-picker" type="color" value="#000000" disabled />
            </label>
          </div>
        </aside>
      </div>

      <div class="buffer-footer">
        <div class="buffer-readout" id="bufferReadout">Chargement de SimBugs.wgstudio...</div>
        <div class="run-status" id="runStatus">Initialisation...</div>
      </div>
    </section>
  </main>
</body>
</html>
